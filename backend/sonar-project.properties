# SonarQube Project Configuration
sonar.projectKey=gielda-platform
sonar.projectName=Gielda - Platforma Inwestycyjna
sonar.projectVersion=1.0
sonar.description=Uniwersalna platforma inwestycyjna do zarządzania portfelem aktywów z automatycznymi zleceniami warunkowymi

# Source directories
sonar.sources=app
sonar.tests=tests

# Language
sonar.language=py

# Encoding
sonar.sourceEncoding=UTF-8

# Python coverage report
sonar.python.coverage.reportPaths=htmlcov/coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclusions
sonar.exclusions=**/venv/**,**/.venv/**,**/migrations/**,**/__pycache__/**,**/node_modules/**

# Test exclusions
sonar.test.exclusions=**/venv/**,**/.venv/**,**/node_modules/**

# Duplications
sonar.cpd.exclusions=**/migrations/**,**/tests/**

# Python specific
sonar.python.coverage.itReportPaths=htmlcov/coverage.xml
